<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual: Grocery List</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf7f2; --surface: #ffffff; --border: #e2dbd0;
      --text: #1e1a2e; --muted: #7a7090; --purple: #5b2d8e; --ruby: #b5263c;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem; }

    .page { max-width: 560px; margin: 0 auto; }

    .no-print { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--purple); text-decoration: none; }
    .print-btn { padding: 0.65rem 1.4rem; background: var(--purple); color: white; border: none; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; }
    .print-btn:hover { opacity: 0.9; }

    .header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--text); }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.3rem; }
    .header p { font-size: 0.8rem; color: var(--muted); }

    .grocery-content { white-space: pre-wrap; font-size: 0.95rem; line-height: 2; }

    .grocery-section { margin-bottom: 1.5rem; }
    .grocery-section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--purple); margin-bottom: 0.6rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .grocery-item-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0; font-size: 0.92rem; }
    .checkbox { width: 16px; height: 16px; border: 1.5px solid var(--text); border-radius: 3px; flex-shrink: 0; }

    @media print {
      body { padding: 0; background: white; }
      .no-print { display: none; }
      .page { max-width: 100%; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="no-print">
    <a href="/meals" class="logo">Ritual</a>
    <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
  </div>

  <div class="header">
    <h1>Grocery List</h1>
    <p>Generated {{ date_generated }}</p>
  </div>

  <div id="grocery-rendered"></div>
  <div class="grocery-content" id="grocery-raw" style="display:none">{{ plan.grocery_list }}</div>
</div>

<script>
  const raw = document.getElementById('grocery-raw').textContent;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l && !l.match(/^GROCERY LIST/i));

  let html = '';
  let currentSection = null;
  let inSection = false;

  lines.forEach(line => {
    // Section headers are lines without a leading dash/bullet and without a colon-quantity pattern
    const isItem = line.startsWith('-') || line.startsWith('•') || line.startsWith('*');
    if (!isItem) {
      if (inSection) html += '</div>';
      currentSection = line.replace(/:$/, '');
      html += `<div class="grocery-section"><div class="grocery-section-title">${currentSection}</div>`;
      inSection = true;
    } else {
      const item = line.replace(/^[-•*]\s*/, '');
      if (!inSection) {
        html += `<div class="grocery-section"><div class="grocery-section-title">Items</div>`;
        inSection = true;
      }
      html += `<div class="grocery-item-row"><span class="checkbox"></span><span>${item}</span></div>`;
    }
  });

  if (inSection) html += '</div>';
  document.getElementById('grocery-rendered').innerHTML = html || `<div class="grocery-content">${raw}</div>`;
</script>
</body>
</html>
