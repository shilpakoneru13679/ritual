<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual: Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
  --bg: #faf7f2; --surface: #ffffff; --surface-2: #f3efe8;
  --border: #e2dbd0; --text: #1e1a2e; --muted: #7a7090;
  --purple: #5b2d8e; --purple-light: #7c3fbf; --purple-pale: #ede5f8;
  --orange: #d4621a; --orange-light: #e8803a; --orange-pale: #fbeee5;
  --ruby: #b5263c; --ruby-pale: #fce8eb;
  --gold: #c49a1a; --gold-pale: #fdf4d8;
  --sapphire: #1a4a9b; --emerald: #1a7a4a; --emerald-pale: #e5f5ec;
}
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 0.08em; margin-bottom: 2.5rem; text-align: center; }
    .logo span { color: var(--purple); }
    .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 2.5rem; width: 100%; max-width: 420px; }
    h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.4rem; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.8rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border 0.15s; }
    input:focus { border-color: var(--purple-light); }
    input::placeholder { color: #c0b8c8; }
    .error { background: rgba(155,35,53,0.12); border: 1px solid var(--error); border-radius: 4px; padding: 0.75rem 1rem; font-size: 0.875rem; color: #e07080; margin-bottom: 1.25rem; }
    .btn { width: 100%; padding: 0.9rem; background: var(--purple); color: white; border: 1.5px solid var(--purple-light); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
    .btn:hover { background: var(--purple-light); }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--muted); }
    .footer-link a { color: var(--purple); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">Ritual</div>
  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Log in to your account.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn">Log in</button>
    </form>
  </div>
  <p class="footer-link">Don't have an account? <a href="/signup">Sign up</a></p>
</body>
</html>
